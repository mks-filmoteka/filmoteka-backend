server:
  port: 8080

spring:
  application:
    name: filmoteka-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/filmoteka
    username: ${FILMOTEKA_USERNAME}
    password: ${FILMOTEKA_PASSWORD}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: filmoteka
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: filmoteka
        format_sql: true

logging:
  level:
    root: INFO
    io.github.maxsouldrake.filmoteka: DEBUG

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    display-request-duration: true
