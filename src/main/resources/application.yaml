server:
  port: 8080

spring:
  application:
    name: filmoteka

  datasource:
    url: jdbc:postgresql://localhost:5432/filmoteka
    username: ${FILMOTEKA_USERNAME}
    password: ${FILMOTEKA_PASSWORD}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: filmoteka
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        default_schema: filmoteka
        format_sql: true
